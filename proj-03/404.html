<!doctype html>
<html lang="en" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found · Christopher</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .error-page h1 {
      font-family: var(--serif);
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 400;
      color: var(--accent);
      margin: 0;
      line-height: 1;
    }

    .error-page p {
      color: var(--text-muted);
      max-width: 32ch;
      margin: 1rem 0 2rem;
    }
  </style>
</head>

<body>
  <main class="error-page">
    <h1>404</h1>
    <p>This page doesn't exist or has been moved.</p>
    <a class="btn btn--primary" href="index.html">Back to portfolio</a>
  </main>
</body>

</html>
